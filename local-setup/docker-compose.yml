# ============================================================
# HCM Local Setup - Docker Compose
# ============================================================

x-common-env: &common-env
  SPRING_DATASOURCE_URL: jdbc:postgresql://pgbouncer:5432/egov
  SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
  SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
  SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "5"
  SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "2"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
  KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
  SPRING_REDIS_HOST: redis
  SPRING_REDIS_PORT: 6379
  SPRING_FLYWAY_ENABLED: "true"
  OTEL_TRACES_EXPORTER: none
  JAVA_TOOL_OPTIONS: -Xms64m -Xmx256m

x-hcm-env: &hcm-env
  <<: *common-env
  EGOV_MDMS_HOST: http://egov-mdms-service:8094
  EGOV_USER_HOST: http://egov-user:8080
  EGOV_IDGEN_HOST: http://egov-idgen:8080
  EGOV_WORKFLOW_HOST: http://egov-workflow-v2:8080
  EGOV_LOCALIZATION_HOST: http://egov-localization:8080
  EGOV_BOUNDARY_HOST: http://boundary-service:8080
  EGOV_ENC_HOST: http://egov-enc-service:8080
  EGOV_FILESTORE_HOST: http://egov-filestore:8080
  EGOV_HRMS_HOST: http://health-hrms:8080
  EGOV_URL_SHORTENING_HOST: http://egov-url-shortening:8080
  EGOV_PROJECT_HOST: http://health-project:8080
  EGOV_HOUSEHOLD_HOST: http://household:8080
  EGOV_INDIVIDUAL_HOST: http://health-individual:8080
  EGOV_FACILITY_HOST: http://facility:8080
  EGOV_PRODUCT_HOST: http://product:8080
  EGOV_STOCK_HOST: http://stock:8080
  EGOV_PLAN_SERVICE_HOST: http://plan-service:8080
  EGOV_CENSUS_HOST: http://census-service:8080
  EGOV_PROJECT_FACTORY_HOST: http://project-factory:8080
  EGOV_EXCEL_INGESTION_HOST: http://excel-ingestion:8080
  BENEFICIARY_IDGEN_HOST: http://beneficiary-idgen:8088

services:
  # ============================================================
  # Infrastructure Services
  # ============================================================

  postgres-db:
    image: ${POSTGRES_IMAGE}
    container_name: hcm-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: egov
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - egov-network

  pgbouncer:
    image: ${PGBOUNCER_IMAGE}
    container_name: hcm-pgbouncer
    environment:
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: egov
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 500
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      AUTH_TYPE: scram-sha-256
    depends_on:
      postgres-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "5432", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      egov-network:
        aliases:
          - postgres

  redis:
    image: ${REDIS_IMAGE}
    container_name: hcm-redis
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - egov-network

  redpanda:
    image: ${REDPANDA_IMAGE}
    container_name: hcm-redpanda
    command:
      - redpanda
      - start
      - --smp
      - '1'
      - --memory
      - 256M
      - --overprovisioned
      - --node-id
      - '0'
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
      - --pandaproxy-addr
      - PLAINTEXT://0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - PLAINTEXT://redpanda:8082
    ports:
      - "${REDPANDA_PORT}:9092"
      - "18082:8082"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 300M
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    networks:
      egov-network:
        aliases:
          - kafka
          - kafka-v2.kafka-cluster

  minio:
    image: ${MINIO_IMAGE}
    container_name: hcm-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - egov-network

  # ============================================================
  # DB Seed
  # ============================================================

  db-seed:
    build: ./docker/db-seed
    container_name: hcm-db-seed
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      PGHOST: postgres-db
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: egov
    volumes:
      - ./db:/seeds:ro
    restart: "no"
    networks:
      - egov-network

  # ============================================================
  # DIGIT Core Services
  # ============================================================

  egov-mdms-service:
    image: ${MDMS_IMAGE}
    container_name: hcm-mdms
    depends_on:
      pgbouncer:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      <<: *common-env
      SERVER_PORT: 8094
      SPRING_FLYWAY_TABLE: flyway_schema_history_mdms
      EGOV_MDMS_SCHEMA_HOST: ${EGOV_MDMS_SCHEMA_HOST:-http://egov-mdms-service:8094}
      EGOV_MDMS_SCHEMA_PATH: ${EGOV_MDMS_SCHEMA_PATH:-/mdms-v2/schema/v1/_search}
      MASTER_PASSWORD: apassword
      MASTER_SALT: asalt
      MASTER_INITIALVECTOR: aiv
      JAVA_TOOL_OPTIONS: -Xms64m -Xmx384m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8094/mdms-v2/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - egov-network

  egov-enc-service:
