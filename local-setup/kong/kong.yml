# ==================== Health Check Routes ====================

- name: health-mdms
  url: http://egov-mdms-service:8094
  routes:
  - name: health-mdms-route
    paths: [/health/mdms]
    strip_path: true
  plugins:
  - name: request-transformer
    config:
      replace:
        uri: /mdms-v2/health

- name: health-user
  url: http://egov-user:8080
  routes:
  - name: health-user-route
    paths: [/health/user]
    strip_path: true
