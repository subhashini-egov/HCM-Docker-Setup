      pgbouncer:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      <<: *hcm-env
      SERVER_PORT: 8083
      SPRING_FLYWAY_TABLE: flyway_schema_history_resource_generator
      JAVA_TOOL_OPTIONS: -Xms64m -Xmx192m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/resource-generator/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - egov-network

