_format_version: "3.0"

consumers:
- username: hcm-dev
  keyauth_credentials:
  - key: hcm-dev-api-key-change-me
  tags: [development]

plugins:
- name: cors
  config:
    origins: ['*']
    methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
    headers:
    - Accept
    - Authorization
    - X-API-Key
    - auth-token
    - Content-Type
    - Content-Disposition
    - tenantId
    credentials: true
    max_age: 3600

- name: request-size-limiting
  config:
    allowed_payload_size: 10
    size_unit: megabytes

services:

