  # ============================================================
  # HCM Node.js Services
  # ============================================================

  project-factory:
    image: ${PROJECT_FACTORY_IMAGE}
    container_name: hcm-project-factory
    depends_on:
      pgbouncer:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      EGOV_HOST: http://kong:8000
      DB_HOST: pgbouncer
      DB_PORT: 5432
      DB_NAME: egov
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SCHEMA: egov
      KAFKA_BROKER_HOST: redpanda:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BASE_SECRET: hcm-local-secret
      DEFAULT_TENANT_ID: mz
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/project-factory/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - egov-network

  boundary-management:
    image: ${BOUNDARY_MANAGEMENT_IMAGE}
    container_name: hcm-boundary-management
    depends_on:
      pgbouncer:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      EGOV_HOST: http://kong:8000
      DB_HOST: pgbouncer
      DB_PORT: 5432
      DB_NAME: egov
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BROKER_HOST: redpanda:9092
      REDIS_HOST: redis
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/boundary-management/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 384M
    networks:
      - egov-network

  auth-proxy:
    image: ${AUTH_PROXY_IMAGE}
    container_name: hcm-auth-proxy
    depends_on:
      pgbouncer:
        condition: service_healthy
    environment:
      SERVER_PORT: 8085
      EGOV_USER_HOST: "http://egov-user:8080/"
      KIBANA_HOST: "http://localhost:5601/"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - egov-network

  # ============================================================
  # Kong API Gateway
  # ============================================================

  kong:
    image: ${KONG_IMAGE}
    container_name: hcm-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    ports:
      - "${KONG_PROXY_PORT}:8000"
      - "${KONG_ADMIN_PORT}:8001"
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - egov-network

networks:
  egov-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  redpanda_data:
