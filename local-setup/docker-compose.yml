      SPRING_FLYWAY_TABLE: flyway_schema_history_enc
      MASTER_PASSWORD: apassword
      MASTER_SALT: asalt
      MASTER_INITIALVECTOR: aiv
      MASTER_PASSWORD_PROVIDER: software
      EGOV_MDMS_HOST: http://egov-mdms-service:8094
      JAVA_TOOL_OPTIONS: -Xms64m -Xmx192m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/egov-enc-service/health >/dev/null 2>&1 || exit 1"]
